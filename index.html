<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #f1f5f9;
  font-family: Arial, sans-serif;
}

.iframe-container {
  width: 100%;
  height: 100dvh;
  position: relative;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
  background: white;
}

.loading {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: white;
  z-index: 9999;
  flex-direction: column;
  gap: 16px;
}

.spinner {
  width: 50px;
  height: 50px;
  border: 5px solid #e2e8f0;
  border-top-color: #0f766e;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

.loading-text {
  color: #0f172a;
  font-size: 16px;
  font-weight: bold;
}
</style>
